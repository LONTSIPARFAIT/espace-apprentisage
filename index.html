<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Régulateur industriel – Interrupteur 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="control-panel">
    <div class="panel-label">RÉGULATION DE TENSION</div>
    <label class="switch">
      <input type="checkbox" checked>
      <div class="button">
        <div class="light-glow"></div>
        <div class="metal-surface"></div>
        <div class="engraving">ON</div>
        <div class="engraving off">OFF</div>
        <div class="shine"></div>
        <div class="shadow-edge"></div>
      </div>
    </label>
    <div class="status-led"></div>
  </div>
</body>
</html>
